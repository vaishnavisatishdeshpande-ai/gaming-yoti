<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GamingYoti - Verification Result</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/result.css">
</head>
<body>
<div class="success-container">
    <div class="checkmark">
        ✓
    </div>
    <h1 id="title">Verification Result</h1>
    <div class="result-card">
        <div class="result-row">
            <span class="label">Age Verification</span>
            <span id="ageResult">-</span>
        </div>
        <div class="result-row">
            <span class="label">Verification Method</span>
            <span id="method">-</span>
        </div>
        <div class="result-row">
            <span class="label">Session Status</span>
            <span id="status">-</span>
        </div>
        <div class="result-row">
            <span class="label">Verified At</span>
            <span id="timestamp">-</span>
        </div>
    </div>
</div>
<script src="/js/result.js"></script>
</body>
</html>
