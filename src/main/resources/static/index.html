<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GamingYoti - Sign Up </title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
<div class="container">
    <h1>GamingYoti</h1>
    <form id="signupForm">
        <input
                type="text"
                id="username"
                placeholder="Username"
                required>
        <input
                type="email"
                id="email"
                placeholder="Email"
                required>
        <input
                type="password"
                id="password"
                placeholder="Password"
                required>
        <button type="submit">
            Create Account
        </button>
    </form>
    <p id="message"></p>
</div>
<script src="/js/signup.js"></script>
</body>
</html>
