apiVersion: apps/v1
kind: Deployment

metadata:
  name: gaming-yoti

spec:
  replicas: 2

  selector:
    matchLabels:
      app: gaming-yoti

  template:
    metadata:
      labels:
        app: gaming-yoti

    spec:
      containers:
        - name: gaming-yoti

          image: vdeshpa1/gaming-yoti:1.0
          imagePullPolicy: Always

          ports:
            - containerPort: 8080

          env:
            - name: YOTI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: yoti-secret
                  key: YOTI_API_KEY

            - name: YOTI_SDK_ID
              valueFrom:
                secretKeyRef:
                  name: yoti-secret
                  key: YOTI_SDK_ID

            - name: AGE_THRESHOLD
              value: "25"